<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#FFFFFF">
  <meta name="description" content="CATTI 猫格测试 · 15道题找到你的本命猫">
  <meta property="og:title" content="CATTI · 猫格测试">
  <meta property="og:description" content="15道题，找到你的本命猫">
  <meta property="og:type" content="website">
  <title>CATTI · 猫格测试</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2016%2016%22%20shape-rendering%3D%22crispEdges%22%3E%3Cpath%20fill%3D%22%231A1A1A%22%20d%3D%22M3%203h2v2H3zm8%200h2v2h-2zM3%205h2v2H3zm2%200h6v6H5zm6%200h2v2h-2zM5%2011h6v2H5z%22/%3E%3C/svg%3E">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Reusable pixel cat SVG (used as default avatar) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="icon-pixel-cat" viewBox="0 0 16 16">
        <g shape-rendering="crispEdges">

          <rect x="13" y="4" width="1" height="1" fill="#1A1A1A"/>
          <rect x="2" y="5" width="1" height="1" fill="#1A1A1A"/>
          <rect x="3" y="5" width="10" height="1" fill="#F4A06B"/>
          <rect x="13" y="5" width="1" height="1" fill="#1A1A1A"/>
          <rect x="1" y="6" width="1" height="1" fill="#1A1A1A"/>

          <rect x="10" y="6" width="1" height="1" fill="#1A1A1A"/>
          <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
          <rect x="12" y="6" width="1" height="1" fill="#1A1A1A"/>
          <rect x="13" y="6" width="1" height="1" fill="#F4A06B"/>
          <rect x="14" y="6" width="1" height="1" fill="#1A1A1A"/>
          <rect x="1" y="7" width="1" height="1" fill="#1A1A1A"/>
          <rect x="2" y="7" width="12" height="1" fill="#F4A06B"/>
          <rect x="14" y="7" width="1" height="1" fill="#1A1A1A"/>
          <rect x="1" y="8" width="1" height="1" fill="#1A1A1A"/>
          <rect x="2" y="8" width="4" height="1" fill="#F4A06B"/>
          <rect x="6" y="8" width="1" height="1" fill="#1A1A1A"/>
          <rect x="7" y="8" width="2" height="1" fill="#FFC2A0"/>
          <rect x="9" y="8" width="1" height="1" fill="#1A1A1A"/>
          <rect x="10" y="8" width="4" height="1" fill="#F4A06B"/>
          <rect x="14" y="8" width="1" height="1" fill="#1A1A1A"/>
          <rect x="2" y="9" width="1" height="1" fill="#1A1A1A"/>
          <rect x="3" y="9" width="4" height="1" fill="#F4A06B"/>
          <rect x="7" y="9" width="2" height="1" fill="#1A1A1A"/>
          <rect x="9" y="9" width="4" height="1" fill="#F4A06B"/>
          <rect x="13" y="9" width="1" height="1" fill="#1A1A1A"/>
          <rect x="2" y="10" width="1" height="1" fill="#1A1A1A"/>

          <rect x="4" y="12" width="2" height="1" fill="#F4A06B"/>
          <rect x="6" y="12" width="1" height="1" fill="#1A1A1A"/>
          <rect x="7" y="12" width="2" height="1" fill="#F4A06B"/>
          <rect x="9" y="12" width="1" height="1" fill="#1A1A1A"/>

        </g>
      </symbol>
      <symbol id="icon-arrow-left" viewBox="0 0 24 24">
        <path fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M14 6l-6 6 6 6"/>
      </symbol>
    </defs>
  </svg>

  <main class="app" id="app">

    <!-- ===================== INTRO ===================== -->
    <section class="view view-intro active" id="view-intro" aria-label="首页">
      <div class="intro-inner">
        <div class="pixel-avatar" aria-hidden="true">
          <svg viewBox="0 0 16 16"><use href="#icon-pixel-cat"/></svg>
        </div>

        <h1 class="title-main">
          <span class="letter">C</span><span class="letter">A</span><span class="letter">T</span><span class="letter">T</span><span class="letter">I</span>
        </h1>
        <p class="title-sub">猫格测试 · 15 道题找到你的本命猫</p>

        <div class="intro-copy">
          <p>你以为你在测试，其实是一只老猫在观察你。</p>
          <p>放松点，这里没有标准答案 —— 只有最像你的那只猫。</p>
        </div>

        <button class="btn btn-primary btn-lg" id="btn-start" type="button">
          开始测试
          <span class="btn-arrow" aria-hidden="true">→</span>
        </button>

        <p class="intro-hint">约 2 分钟 · 将为你匹配 24 只猫中最相似的一只</p>
      </div>
    </section>

    <!-- ===================== QUIZ ===================== -->
    <section class="view view-quiz" id="view-quiz" aria-label="题目">
      <header class="quiz-header">
        <button class="icon-btn" id="btn-prev" type="button" aria-label="上一题" disabled>
          <svg viewBox="0 0 24 24"><use href="#icon-arrow-left"/></svg>
        </button>
        <div class="progress-count" role="progressbar" aria-valuemin="1" aria-valuemax="15" aria-valuenow="1">
          <span id="progress-current">1</span> / <span id="progress-total">15</span>
        </div>
        <div class="header-spacer" aria-hidden="true"></div>
      </header>

      <div class="scenario-hint">
        <div class="scenario-avatar" aria-hidden="true">
          <svg viewBox="0 0 16 16"><use href="#icon-pixel-cat"/></svg>
        </div>
        <div class="scenario-bubble" id="scenario-bubble">社交还是不社交，这是个问题</div>
      </div>

      <div class="quiz-stage">
        <article class="quiz-card" id="quiz-card">
          <h2 class="q-text" id="q-text">题目加载中…</h2>
          <ul class="options" id="options-list" role="radiogroup" aria-label="选项"></ul>
        </article>
      </div>

      <footer class="quiz-footer">
        <button class="btn btn-primary" id="btn-continue" type="button" disabled>
          继续
          <span class="btn-arrow" aria-hidden="true">→</span>
        </button>
      </footer>
    </section>

    <!-- ===================== RESULT ===================== -->
    <section class="view view-result" id="view-result" aria-label="结果">
      <div class="result-top">
        <div class="pixel-avatar pixel-avatar-lg" aria-hidden="true">
          <img id="result-image" src="" alt="">
        </div>
        <p class="result-preamble">你的本命猫是</p>
        <h2 class="result-name" id="result-name"></h2>
        <p class="result-slogan" id="result-slogan"></p>
      </div>

      <blockquote class="result-quote" id="result-quote"></blockquote>

      <h3 class="result-section-title">性格标签</h3>
      <div class="result-tags" id="result-tags"></div>

      <div class="result-divider"></div>

      <div class="result-interpretation" id="result-interpretation"></div>

      <div class="result-actions">
        <button class="btn btn-primary" id="btn-restart" type="button">再测一次</button>
        <button class="btn btn-secondary" id="btn-share" type="button">复制分享链接</button>
      </div>

      <p class="result-footer-note">愿你和这只猫一样，有自己的节奏。</p>
    </section>

  </main>

  <script src="app.js" defer></script>
</body>
</html>
